<form hx-post="/connect/signup" hx-swap="innerHTML" hx-target="#response">
    <label for="username">Username:</label>
    <input id="username" name="username" required type="text"><br><br>

    <label for="pwd_clear">Password:</label>
    <input id="pwd_clear" name="pwd_clear" required type="password"><br><br>

    <!-- Corrected the name attribute for the birthdate input -->
    <label for="birthdate">Birthdate:</label>
    <input id="birthdate" name="birthdate" required type="date"><br><br>

    <label for="height_cm">Height (cm):</label>
    <input id="height_cm" name="height_cm" required type="number"><br><br>

    <!-- Updated button text to match form's purpose -->
    <button type="submit">Signup</button>
</form>
<div id="response"></div>
